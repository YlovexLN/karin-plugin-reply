name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: |
          # 检查锁文件是否存在，如果不存在则生成
          if [ -f "pnpm-lock.yaml" ]; then
            echo "锁文件存在，使用 --frozen-lockfile"
            pnpm install --frozen-lockfile
          else
            echo "锁文件不存在，生成新的锁文件"
            pnpm install
          fi

      - name: Verify package.json structure
        run: |
          echo "=== 验证 package.json 结构 ==="
          node -e "
            const pkg = require('./package.json');
            
            // 检查必要字段
            const requiredFields = ['name', 'version', 'main', 'description'];
            const missing = requiredFields.filter(field => !pkg[field]);
            
            if (missing.length > 0) {
              console.error('❌ 缺少必要字段:', missing);
              process.exit(1);
            }
            
            console.log('✅ 所有必要字段都存在');
            console.log('包名:', pkg.name);
            console.log('版本:', pkg.version);
            console.log('描述:', pkg.description);
            
            // 检查 karin 字段
            if (!pkg.karin) {
              console.error('❌ 缺少 karin 字段');
              process.exit(1);
            }
            
            console.log('✅ karin 字段存在');
          "

      - name: Check for syntax errors
        run: |
          echo "=== 检查 JavaScript 语法错误 ==="
          # 检查 lib 目录下的所有 JS 文件
          if [ -d "lib" ]; then
            find lib -name "*.js" -exec node -c {} \;
            echo "✅ 所有 JavaScript 文件语法正确"
          else
            echo "⚠️ lib 目录不存在"
          fi

      - name: Verify plugin loads
        run: |
          echo "=== 验证插件是否能正常加载 ==="
          # 尝试加载插件入口文件
          if [ -f "lib/index.js" ]; then
            node -e "
              try {
                // 尝试导入插件入口
                import('./lib/index.js').then(() => {
                  console.log('✅ 插件入口文件可以正常导入');
                }).catch(err => {
                  console.error('❌ 插件入口文件导入失败:', err.message);
                  process.exit(1);
                });
              } catch (err) {
                console.error('❌ 插件入口文件导入失败:', err.message);
                process.exit(1);
              }
            "
          else
            echo "❌ lib/index.js 不存在"
            exit 1
          fi