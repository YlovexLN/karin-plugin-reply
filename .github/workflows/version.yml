name: Version and Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      published: ${{ steps.publish.outputs.published }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Check for changesets
        id: changesets
        run: |
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "hasChangesets=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changesets found, skipping version update"
          else
            echo "hasChangesets=true" >> $GITHUB_OUTPUT
            echo "✅ Found changesets"
          fi

      - name: Update version and sync to web.config.js
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 运行 changeset version（会自动更新 package.json 和 CHANGELOG.md）
          pnpm changeset version
          
          # 同步版本号到 web.config.js
          node scripts/sync-version.js
          
          # 检查是否有更改
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # 提交版本更新
          git add .
          NEW_VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          
          # 推送更改和 tag
          git push origin main
          git push origin "v${NEW_VERSION}"
          
          echo "✅ Version updated to v${NEW_VERSION}"
          echo "published=true" >> $GITHUB_OUTPUT

      - name: Setup npm authentication
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> ~/.npmrc
          echo "@ylovexln:registry=https://npm.pkg.github.com/" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.publish.outputs.published != 'true'
        run: |
          echo "🚀 Publishing to npm registry..."
          pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.publish.outputs.published != 'true'
        run: |
          echo "🚀 Publishing to GitHub Packages..."
          
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          
          echo "Package: $PACKAGE_NAME@$CURRENT_VERSION"
          
          # 创建临时目录
          mkdir -p /tmp/gh-publish
          cp -r . /tmp/gh-publish/
          cd /tmp/gh-publish
          
          # 修改包名为 GitHub Packages 格式
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.name = '@ylovexln/' + pkg.name;
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com/' };
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
            console.log('Modified package name to:', pkg.name);
          "
          
          # 发布到 GitHub Packages
          pnpm publish --no-git-checks --registry=https://npm.pkg.github.com/
          
          echo "✅ Successfully published to GitHub Packages!"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: GitHub Release
    needs: version
    runs-on: ubuntu-latest
    if: needs.version.outputs.hasChangesets == 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: ./RELEASE_BODY.md

      - name: Pack npm package
        run: |
          echo "📦 Packing npm package..."
          pnpm pack
          ls -la *.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ./RELEASE_BODY.md
          files: |
            *.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
