name: Version and Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      new_version: ${{ steps.update_version.outputs.new_version }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Check for changesets
        id: changesets
        run: |
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "hasChangesets=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changesets found, skipping version update"
          else
            echo "hasChangesets=true" >> $GITHUB_OUTPUT
            echo "✅ Found changesets"
          fi

      - name: Update version and sync to web.config.js
        id: update_version
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 运行 changeset version（会自动更新 package.json 和 CHANGELOG.md）
          pnpm changeset version
          
          # 同步版本号到 web.config.js
          node scripts/sync-version.js
          
          # 检查是否有更改
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # 提交版本更新
          git add .
          NEW_VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          
          # 推送更改和 tag
          git push origin main
          git push origin "v${NEW_VERSION}"
          
          echo "✅ Version updated to v${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Setup npm authentication
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        id: publish
        if: steps.changesets.outputs.hasChangesets == 'true'
        continue-on-error: true
        run: |
          echo "🚀 Publishing to npm registry..."
          
          # 获取当前版本
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          # 检查 npm 上是否已存在该版本
          if npm view karin-plugin-reply@$CURRENT_VERSION version >/dev/null 2>&1; then
            echo "⚠️ 版本 $CURRENT_VERSION 已存在于 npm，跳过发布"
            exit 0
          fi
          
          pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: GitHub Release
    needs: version
    runs-on: ubuntu-latest
    if: needs.version.outputs.hasChangesets == 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: ./RELEASE_BODY.md

      - name: Pack npm package
        run: |
          echo "📦 Packing npm package..."
          pnpm pack
          ls -la *.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ needs.version.outputs.new_version }}
          tag_name: v${{ needs.version.outputs.new_version }}
          body_path: ./RELEASE_BODY.md
          files: |
            *.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
