name: Publish to npm and create GitHub Release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送 v 开头的 tag，如 v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 用于创建 GitHub Release
      id-token: write   # 用于 OIDC（可选，见下文）

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      # ==========================
      # 🔑 关键步骤：从 tag 自动设置 package.json 版本
      # ==========================
      - name: Extract version from tag
        id: get_version
        run: |
          TAG=${{ github.ref_name }}
          if [[ $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION=${TAG#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected version: $VERSION"
          else
            echo "Invalid tag format. Expected v1.2.3, got $TAG"
            exit 1
          fi

      - name: Update package.json version
        run: |
          # 使用 jq 修改 version（推荐）
          npm pkg set version=${{ steps.get_version.outputs.version }}
          # 或者用 sed（如果不想装 jq）：
          # sed -i "s/\"version\": *\"[^\"]*\"/\"version\": \"${{ steps.get_version.outputs.version }}\"/" package.json

      # ==========================
      # 发布到 npm
      # ==========================
      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        env:
          # 方式 A：使用 NPM_TOKEN（适合首次发布或未启用 OIDC）
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

          # 方式 B：如果你已启用 npm Trusted Publishing，改用下面这行（注释掉上面）：
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================
      # 创建 GitHub Release
      # ==========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}