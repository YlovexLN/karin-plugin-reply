name: Publish to npm and create GitHub Release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送 v 开头的 tag，如 v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 用于创建 GitHub Release
      id-token: write   # 可选（如果你用 OIDC 发布 npm）

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须获取完整历史和所有 tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      # ==========================
      # 📝 使用 git-cliff 生成 Changelog（基于 cliff.toml）
      # ==========================
      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: ./RELEASE_BODY.md

      # ==========================
      # 发布到 npm
      # ==========================
      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # 如果你启用了 npm Trusted Publishing，可改用：
          # NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================
      # 🚀 创建 GitHub Release，使用自定义日志
      # ==========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ./RELEASE_BODY.md  # 👈 关键：使用 git-cliff 生成的内容
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}